# AgentHub 能力市场分类配置
# 三级分类 + 多维标签体系

categories:
  - id: isp
    name: 网络运营
    icon: "📡"
    description: ISP宽带运营商业务能力
    color: "#3B82F6"
    subcategories:
      - id: isp-broadband
        name: 宽带业务
        description: 宽带故障诊断、装维工单、光猫注册等
      - id: isp-billing
        name: 计费账务
        description: LFRADIUS查询、套餐管理、充值续费
      - id: isp-iptv
        name: IPTV/增值业务
        description: 光翔IPTV管理、节目包管理
      - id: isp-cs
        name: 客服运营
        description: 客服话术、微信机器人、NLP意图识别
      - id: isp-commission
        name: 佣金结算
        description: 装维佣金、代理商结算

  - id: netmgmt
    name: 网络设备管理
    icon: "🔧"
    description: 各类网络设备的原子操作能力
    color: "#10B981"
    subcategories:
      - id: net-olt
        name: OLT管理
        description: 华为MA5680T/MA5800端口、光功率、告警、配置
      - id: net-tr069
        name: 光猫管理(TR069)
        description: iRouter ITMS注册、诊断、参数下发、批量巡检
      - id: net-switch
        name: 交换机管理
        description: 华为CE6850/S5700、锐捷、H3C
      - id: net-router
        name: 路由器管理
        description: 华为路由器、爱快路由器
      - id: net-wireless
        name: 无线AP管理
        description: AC管理、AP状态查询与配置
      - id: net-monitor
        name: 监控告警
        description: 在线监测、流量分析、链路质量

  - id: property
    name: 物业管理
    icon: "🏢"
    description: 物业公司全岗位能力
    color: "#8B5CF6"
    subcategories:
      - id: prop-cs
        name: 客服前台
        description: 业主报修、投诉受理、访客登记、费用查询
      - id: prop-engineering
        name: 工程维修
        description: 设备巡检、维修派单、电梯管理、水电抄表
      - id: prop-security
        name: 秩序安防
        description: 门禁管理、巡逻打卡、车位管理、监控查看
      - id: prop-finance
        name: 财务收费
        description: 物业费催缴、账单生成、收据打印、欠费统计
      - id: prop-cleaning
        name: 保洁绿化
        description: 保洁排班、绿化养护、垃圾清运
      - id: prop-hr
        name: 行政人事
        description: 员工考勤、排班管理、培训管理
      - id: prop-system
        name: 系统对接
        description: 万科物业系统、绿城系统、明源云、通用ERP对接

  - id: enterprise
    name: 企业办公
    icon: "💼"
    description: 企业ERP及办公自动化能力
    color: "#F59E0B"
    subcategories:
      - id: ent-finance
        name: 财务会计
        description: 金蝶K3/星空、用友U8/T+、凭证录入、报表生成
      - id: ent-hr
        name: 人力资源
        description: 考勤统计、薪资计算、招聘管理、培训管理
      - id: ent-purchase
        name: 采购仓储
        description: 采购单、入库出库、库存盘点、供应商管理
      - id: ent-crm
        name: 销售CRM
        description: 客户管理、商机跟进、合同管理、回款跟踪
      - id: ent-oa
        name: 协同办公
        description: OA审批、邮件管理、日程管理、文档管理
      - id: ent-bi
        name: 数据报表
        description: BI看板、经营分析、自定义报表

  - id: security
    name: 安防监控
    icon: "🔒"
    description: 安防设备管理与监控
    color: "#EF4444"
    subcategories:
      - id: sec-camera
        name: 视频监控
        description: 海康/大华摄像头管理、录像回放、AI识别
      - id: sec-access
        name: 门禁系统
        description: 人脸识别、刷卡管理、访客授权
      - id: sec-alarm
        name: 报警系统
        description: 周界报警、烟感报警、联动处置

  - id: common
    name: 通用工具
    icon: "🛠️"
    description: 跨行业通用基础能力
    color: "#6B7280"
    subcategories:
      - id: tool-nlp
        name: NLP/文本处理
        description: 文本分类、实体提取、情感分析
      - id: tool-data
        name: 数据转换
        description: 格式转换、数据清洗、批量导入导出
      - id: tool-notify
        name: 通知推送
        description: 短信、微信、邮件、钉钉推送
      - id: tool-doc
        name: 文档处理
        description: PDF生成、合同模板、报表导出

# 标签维度（独立于分类，用于筛选和推荐）
tag_dimensions:
  - dimension: brand
    name: 品牌/系统
    values:
      - 华为
      - 锐捷
      - H3C
      - 爱快
      - iRouter
      - 金蝶
      - 用友
      - 海康
      - 大华
      - 万科物业
      - 绿城
      - 明源云
      - LFRADIUS
      - 光翔
  - dimension: device
    name: 设备类型
    values:
      - OLT
      - 光猫
      - 交换机
      - 路由器
      - AP
      - 摄像头
      - 服务器
  - dimension: level
    name: 能力层级
    values:
      - atomic
      - composite
    labels:
      atomic: 原子能力
      composite: 组合能力
  - dimension: func
    name: 功能类型
    values:
      - 查询
      - 诊断
      - 配置
      - 报表
      - 监控
      - 自动化
      - 对话

# 能力层级定义
capability_levels:
  atomic:
    name: 原子能力
    description: 单一设备/系统的操作能力，可被组合能力编排调用
    pricing_hint: 按次低价计费
  composite:
    name: 组合能力
    description: 编排多个原子能力，面向业务场景
    pricing_hint: 按次较高计费，内部调用原子能力不重复计费
